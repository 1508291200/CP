name: Deploy to Server

on:
  push:
    branches: [main]
    paths:
      - 'cp-archive/**'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 构建前端 ──────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cp-archive/frontend/package-lock.json

      - name: Install frontend deps
        run: cd cp-archive/frontend && npm ci

      - name: Build frontend
        run: cd cp-archive/frontend && npm run build

      # ── 构建后端（类型检查）───────────────────────────
      - name: Install backend deps
        run: cd cp-archive/backend && npm ci

      - name: Typecheck backend
        run: cd cp-archive/backend && npm run typecheck

      # ── 部署到服务器 ──────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /app/cp-archive

            # 拉取最新代码
            git pull origin main

            # 重新构建前端（服务器端构建，确保环境一致）
            cd frontend && npm ci && npm run build && cd ..

            # 重新构建并启动 API 容器
            docker compose build api
            docker compose up -d

            # 等待数据库就绪后执行迁移
            sleep 5
            docker compose exec api npm run db:migrate

            echo "✅ Deploy complete at $(date)"
