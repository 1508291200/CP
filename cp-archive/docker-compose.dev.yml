services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=cparchive
      - POSTGRES_USER=cpuser
      - POSTGRES_PASSWORD=cppassword
    volumes:
      - cp_dev_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpuser -d cparchive"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - cp_dev_redis:/data
    command: redis-server --loglevel warning

volumes:
  cp_dev_postgres:
  cp_dev_redis:
