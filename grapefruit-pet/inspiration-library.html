<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵感库</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
        background: rgba(0, 0, 0, 0.4);
        overflow: hidden;
      }

      .library-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .library-window {
        background: white;
        border-radius: 16px;
        width: 100%;
        max-width: 1000px;
        height: 90vh;
        max-height: 800px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.2);
        animation: slideUp 0.3s ease;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .library-header {
        padding: 20px 24px;
        border-bottom: 2px solid #f3f4f6;
        background: linear-gradient(135deg, #faf5ff 0%, #f3e8ff 100%);
      }

      .header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      .library-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 20px;
        font-weight: 600;
        color: #7c3aed;
      }

      .close-btn {
        background: rgba(255, 255, 255, 0.8);
        border: none;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 18px;
        transition: all 0.2s ease;
      }

      .close-btn:hover {
        background: white;
        transform: scale(1.1);
      }

      .search-box {
        display: flex;
        gap: 8px;
      }

      .search-input {
        flex: 1;
        padding: 10px 16px;
        border: 2px solid #e9d5ff;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        transition: all 0.2s ease;
      }

      .search-input:focus {
        border-color: #a855f7;
        box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
      }

      .stats {
        font-size: 12px;
        color: #6b7280;
        margin-top: 8px;
      }

      .library-content {
        flex: 1;
        overflow-y: auto;
        padding: 16px 24px;
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #9ca3af;
      }

      .empty-icon {
        font-size: 64px;
        margin-bottom: 16px;
        opacity: 0.5;
      }

      .inspirations-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 16px;
      }

      .inspiration-card {
        background: linear-gradient(135deg, #faf5ff 0%, #f5f3ff 100%);
        border: 2px solid #e9d5ff;
        border-radius: 12px;
        padding: 16px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .inspiration-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(168, 85, 247, 0.2);
        border-color: #d8b4fe;
      }

      .card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .card-title {
        font-size: 15px;
        font-weight: 600;
        color: #7c3aed;
        flex: 1;
        line-height: 1.4;
      }

      .card-favorite {
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.2s ease;
      }

      .card-favorite:hover {
        transform: scale(1.2);
      }

      .card-content {
        font-size: 13px;
        color: #4b5563;
        line-height: 1.6;
        margin-bottom: 12px;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .card-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
        min-height: 20px;
      }

      .card-tag {
        background: rgba(168, 85, 247, 0.15);
        color: #7c3aed;
        padding: 2px 8px;
        border-radius: 8px;
        font-size: 11px;
        font-weight: 500;
      }

      .card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 11px;
        color: #9ca3af;
        padding-top: 12px;
        border-top: 1px solid #e9d5ff;
      }

      .card-category {
        background: rgba(168, 85, 247, 0.1);
        color: #7c3aed;
        padding: 3px 8px;
        border-radius: 6px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="library-container">
      <div class="library-window">
        <div class="library-header">
          <div class="header-row">
            <div class="library-title">
              <span>💡</span>
              <span>灵感库</span>
            </div>
            <button class="close-btn" id="closeBtn">✕</button>
          </div>

          <div class="search-box">
            <input
              type="text"
              class="search-input"
              id="searchInput"
              placeholder="🔍 搜索灵感..."
            />
          </div>

          <div class="stats" id="stats">共 0 条灵感</div>
        </div>

        <div class="library-content" id="content">
          <div class="empty-state">
            <div class="empty-icon">💭</div>
            <div>还没有记录任何灵感</div>
            <div style="font-size: 13px; color: #d1d5db; margin-top: 8px;">
              右键西柚 → 💡 灵感管理 → ✍️ 快速记录
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const { ipcRenderer } = require('electron');

      const searchInput = document.getElementById('searchInput');
      const statsEl = document.getElementById('stats');
      const contentEl = document.getElementById('content');
      const closeBtn = document.getElementById('closeBtn');

      let allInspirations = [];
      let filteredInspirations = [];

      // 请求数据
      ipcRenderer.send('inspiration:requestData');

      // 接收数据
      ipcRenderer.on('inspiration:data', (_, data) => {
        allInspirations = data || [];
        filteredInspirations = allInspirations;
        render();
      });

      // 搜索
      searchInput.addEventListener('input', () => {
        const query = searchInput.value.toLowerCase();
        if (!query) {
          filteredInspirations = allInspirations;
        } else {
          filteredInspirations = allInspirations.filter(item => {
            const searchText = [
              item.title || '',
              item.content,
              ...(item.tags || [])
            ].join(' ').toLowerCase();
            return searchText.includes(query);
          });
        }
        render();
      });

      // 渲染
      function render() {
        statsEl.textContent = `共 ${filteredInspirations.length} 条灵感`;

        if (filteredInspirations.length === 0) {
          contentEl.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">💭</div>
              <div>${searchInput.value ? '没有找到相关灵感' : '还没有记录任何灵感'}</div>
              <div style="font-size: 13px; color: #d1d5db; margin-top: 8px;">
                ${searchInput.value ? '试试其他关键词' : '右键西柚 → 💡 灵感管理 → ✍️ 快速记录'}
              </div>
            </div>
          `;
          return;
        }

        const html = `
          <div class="inspirations-grid">
            ${filteredInspirations.map(item => `
              <div class="inspiration-card" data-id="${item.id}">
                <div class="card-header">
                  <div class="card-title">${item.title || '无标题'}</div>
                  <span class="card-favorite" data-id="${item.id}">
                    ${item.favorite ? '⭐' : '☆'}
                  </span>
                </div>
                <div class="card-content">${item.content}</div>
                ${item.tags && item.tags.length > 0 ? `
                  <div class="card-tags">
                    ${item.tags.map(tag => `<span class="card-tag">${tag}</span>`).join('')}
                  </div>
                ` : ''}
                <div class="card-footer">
                  <span class="card-category">${getCategoryLabel(item.category)}</span>
                  <span>📅 ${formatDate(item.createdAt)}</span>
                  <span>${item.implemented ? '✅' : '⭕'}</span>
                </div>
              </div>
            `).join('')}
          </div>
        `;

        contentEl.innerHTML = html;

        // 绑定收藏点击事件
        document.querySelectorAll('.card-favorite').forEach(el => {
          el.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = el.dataset.id;
            ipcRenderer.send('inspiration:toggleFavorite', id);
          });
        });
      }

      function getCategoryLabel(category) {
        const labels = {
          work: '工作', project: '项目', learning: '学习',
          life: '生活', creative: '创意', technical: '技术',
          design: '设计', business: '商业', random: '随机',
          uncategorized: '未分类'
        };
        return labels[category] || '未分类';
      }

      function formatDate(timestamp) {
        const date = new Date(timestamp);
        const now = new Date();
        const diffMs = now - date;
        const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

        if (diffDays === 0) return '今天';
        if (diffDays === 1) return '昨天';
        if (diffDays < 7) return `${diffDays}天前`;
        if (diffDays < 30) return `${Math.floor(diffDays / 7)}周前`;
        return date.toLocaleDateString('zh-CN');
      }

      // 关闭
      closeBtn.addEventListener('click', () => window.close());
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') window.close();
      });
      document.querySelector('.library-container').addEventListener('click', (e) => {
        if (e.target.classList.contains('library-container')) {
          window.close();
        }
      });
    </script>
  </body>
</html>
