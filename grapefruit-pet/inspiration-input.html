<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>快速记录灵感</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
        background: transparent;
        overflow: hidden;
      }

      .inspiration-input-page {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.3);
        padding: 20px;
      }

      .inspiration-form {
        background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
        border-radius: 16px;
        padding: 32px;
        width: 100%;
        max-width: 1400px;
        min-height: 600px;
        box-shadow: 0 8px 32px rgba(147, 51, 234, 0.2);
        animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .form-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 20px;
      }

      .form-icon {
        font-size: 24px;
      }

      .form-title {
        font-size: 18px;
        font-weight: 600;
        color: #7c3aed;
        flex: 1;
      }

      .form-body {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .input-label {
        font-size: 12px;
        color: #6b7280;
        font-weight: 500;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #d8b4fe;
        border-radius: 8px;
        font-size: 13px;
        outline: none;
        transition: all 0.2s ease;
        font-family: inherit;
        background: rgba(255, 255, 255, 0.9);
      }

      input:focus,
      textarea:focus {
        border-color: #a855f7;
        background: white;
        box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
      }

      textarea {
        resize: vertical;
        min-height: 300px;
        max-height: 600px;
        line-height: 1.8;
      }

      .char-count {
        font-size: 11px;
        color: #9ca3af;
        text-align: right;
      }

      .tags-display,
      .category-display {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        min-height: 28px;
      }

      .tag-chip {
        background: linear-gradient(135deg, #a855f7 0%, #9333ea 100%);
        color: white;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 500;
      }

      .category-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: rgba(168, 85, 247, 0.1);
        color: #7c3aed;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 500;
      }

      .hint-text {
        font-size: 11px;
        color: #9ca3af;
        margin-top: 4px;
      }

      .form-actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }

      .form-actions button {
        flex: 1;
        padding: 12px 20px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .btn-cancel {
        background: rgba(255, 255, 255, 0.9);
        color: #6b7280;
        border: 2px solid #e5e7eb;
      }

      .btn-cancel:hover {
        background: white;
        border-color: #d1d5db;
      }

      .btn-save {
        background: linear-gradient(135deg, #a855f7 0%, #9333ea 100%);
        color: white;
      }

      .btn-save:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(168, 85, 247, 0.4);
      }

      .btn-save:active,
      .btn-cancel:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="inspiration-input-page">
      <div class="inspiration-form">
        <div class="form-header">
          <span class="form-icon">💡</span>
          <h2 class="form-title">快速记录灵感</h2>
        </div>

        <div class="form-body">
          <div class="input-group">
            <label class="input-label">标题（可选）</label>
            <input
              type="text"
              id="title"
              placeholder="为你的灵感取个名字..."
            />
          </div>

          <div class="input-group">
            <label class="input-label">内容 *</label>
            <textarea
              id="content"
              placeholder="记录你的想法... 支持 #标签"
            ></textarea>
            <div class="char-count"><span id="charCount">0</span> 字</div>
          </div>

          <div class="input-group" id="tagsGroup" style="display:none">
            <label class="input-label">🏷️ 自动识别标签</label>
            <div class="tags-display" id="tagsDisplay"></div>
          </div>

          <div class="input-group" id="categoryGroup" style="display:none">
            <label class="input-label">📂 自动分类</label>
            <div class="category-display" id="categoryDisplay"></div>
          </div>

          <div class="hint-text">
            💡 提示：在内容中使用 #标签 可以快速添加标签
          </div>
        </div>

        <div class="form-actions">
          <button class="btn-cancel" id="btnCancel">✖ 取消</button>
          <button class="btn-save" id="btnSave">💾 保存</button>
        </div>
      </div>
    </div>

    <script>
      const { ipcRenderer } = require('electron');

      const titleInput = document.getElementById('title');
      const contentInput = document.getElementById('content');
      const charCountEl = document.getElementById('charCount');
      const tagsGroup = document.getElementById('tagsGroup');
      const tagsDisplay = document.getElementById('tagsDisplay');
      const categoryGroup = document.getElementById('categoryGroup');
      const categoryDisplay = document.getElementById('categoryDisplay');
      const btnCancel = document.getElementById('btnCancel');
      const btnSave = document.getElementById('btnSave');

      // 聚焦内容框
      contentInput.focus();

      // 字数统计
      contentInput.addEventListener('input', () => {
        charCountEl.textContent = contentInput.value.length;
        analyzeContent();
      });

      // 简单的标签提取
      function extractTags(text) {
        const hashTags = text.match(/#[\u4e00-\u9fa5\w]+/g);
        const tags = hashTags ? hashTags.map(t => t.slice(1)) : [];
        
        // 技术关键词
        const techKeywords = [
          'JavaScript', 'TypeScript', 'Python', 'React', 'Vue', 'Node.js',
          'Electron', 'AI', 'ML', '前端', '后端', '算法'
        ];
        
        techKeywords.forEach(keyword => {
          if (text.includes(keyword) && !tags.includes(keyword)) {
            tags.push(keyword);
          }
        });
        
        return tags;
      }

      // 简单的分类
      function classifyContent(text) {
        const keywords = {
          '技术': ['代码', '算法', '架构', '优化', 'bug', '方案', '技术'],
          '项目': ['想做', '开发', '项目', '功能', '产品', '实现'],
          '学习': ['学习', '笔记', '理解', '掌握', '教程'],
          '工作': ['会议', '任务', '工作', '项目进度', '汇报'],
          '设计': ['设计', 'UI', 'UX', '界面', '交互', '视觉'],
          '创意': ['创意', '点子', '灵感', '想法'],
        };

        let maxScore = 0;
        let category = '未分类';

        for (const [cat, words] of Object.entries(keywords)) {
          const score = words.reduce((s, word) => s + (text.includes(word) ? 1 : 0), 0);
          if (score > maxScore) {
            maxScore = score;
            category = cat;
          }
        }

        return maxScore > 0 ? category : '未分类';
      }

      // 分析内容
      function analyzeContent() {
        const text = contentInput.value;
        
        if (!text.trim()) {
          tagsGroup.style.display = 'none';
          categoryGroup.style.display = 'none';
          return;
        }

        // 提取标签
        const tags = extractTags(text);
        if (tags.length > 0) {
          tagsDisplay.innerHTML = tags.map(tag => 
            `<span class="tag-chip">${tag}</span>`
          ).join('');
          tagsGroup.style.display = 'flex';
        } else {
          tagsGroup.style.display = 'none';
        }

        // 分类
        const category = classifyContent(text);
        if (category !== '未分类') {
          categoryDisplay.innerHTML = `<span class="category-badge">${category}</span>`;
          categoryGroup.style.display = 'flex';
        } else {
          categoryGroup.style.display = 'none';
        }
      }

      // 保存
      btnSave.addEventListener('click', () => {
        const content = contentInput.value.trim();
        if (!content) {
          contentInput.focus();
          return;
        }

        const title = titleInput.value.trim();
        const tags = extractTags(contentInput.value);
        const category = classifyContent(contentInput.value);

        // 发送到主进程
        ipcRenderer.send('inspiration:save', {
          title: title || undefined,
          content,
          tags,
          category,
        });

        // 关闭窗口
        window.close();
      });

      // 取消
      btnCancel.addEventListener('click', () => {
        window.close();
      });

      // 键盘快捷键
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          window.close();
        } else if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          btnSave.click();
        }
      });

      // 点击背景关闭
      document.querySelector('.inspiration-input-page').addEventListener('click', (e) => {
        if (e.target.classList.contains('inspiration-input-page')) {
          window.close();
        }
      });
    </script>
  </body>
</html>
